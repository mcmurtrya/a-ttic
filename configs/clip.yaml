# Encoder: CLIP ViT-L/14 — OpenAI, language-supervised (softmax contrastive)
# Pretraining: OpenAI WIT (~400M image-text pairs)
# Role: language-supervised, condition 1

defaults:
  - base

encoder:
  name: clip
  checkpoint: openai/clip-vit-large-patch14
  hidden_dim: 1024
  patch_count: 256
  image_size: 224
  supervision: language
